spring:
  application:
    name: gateway

  cloud:
    gateway:
      discovery:
        locator:
          # Let Spring Cloud Gateway automatically create routes for services that are registered in Eureka.
          enabled: false

      routes:
        - id: students
          uri: http://localhost:8090
          predicates:
            - Path=/api/v1/students/**

        - id: schools
          uri: http://localhost:8070
          predicates:
            - Path=/api/v1/schools/**


server:
  port: 8222

eureka:
  client:
    register-with-eureka: false

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: Student Service
        url: http://localhost:8090/v3/api-docs

      - name: School Service
        url: http://localhost:8070/v3/api-docs

management:
  tracing:
    sampling:
      probability: 1.0